<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>联机双人井字棋</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei",sans-serif;
}
body{
    background: linear-gradient(135deg, #e8f4fd, #fef4f8);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
}
h1{
    color: #222;
    margin-bottom: 15px;
    font-size: 26px;
}
.room-box{
    background:#fff;
    padding:16px 24px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
    display:flex;
    gap:10px;
    align-items:center;
}
#roomId{
    padding:8px 12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
    width:140px;
}
#joinBtn{
    padding:8px 16px;
    background:#2196F3;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
#stateTip{
    margin-bottom:16px;
    font-size:17px;
    color:#333;
}
.game-card{
    background: #fff;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.12);
}
table{
    border-collapse: separate;
    border-spacing: 8px;
}
td{
    width: 85px;
    height: 85px;
    background-color: #f2f7ff;
    border-radius: 10px;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
}
td:hover{
    background-color: #dceaff;
    transform: scale(1.03);
}
td.O{
    color: #1976d2;
}
td.X{
    color: #d32f2f;
}
.restart-btn{
    margin-top: 18px;
    padding: 9px 24px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg,#42a5f5,#1976d2);
    color: white;
    font-size: 16px;
    cursor: pointer;
}
.restart-btn:hover{
    box-shadow: 0 5px 15px rgba(25,118,210,0.3);
}
.tips{
    margin-top:20px;
    font-size:14px;
    color:#666;
    text-align:center;
    max-width:420px;
    line-height:1.6;
}
</style>
</head>
<body>
<h1>🌐 联机井字棋</h1>
<div class="room-box">
    <span>房间号：</span>
    <input id="roomId" placeholder="自定义房间号">
    <button id="joinBtn">加入/创建房间</button>
</div>
<div id="stateTip">未连接房间，请输入房间号加入</div>
<div class="game-card">
<table>
    <tr>
        <td data-index="0"></td>
        <td data-index="1"></td>
        <td data-index="2"></td>
    </tr>
    <tr>
        <td data-index="3"></td>
        <td data-index="4"></td>
        <td data-index="5"></td>
    </tr>
    <tr>
        <td data-index="6"></td>
        <td data-index="7"></td>
        <td data-index="8"></td>
    </tr>
</table>
<button class="restart-btn" onclick="resetGame()">重新开局</button>
</div>
<div class="tips">
1. 两个人输入一模一样的房间号，点加入房间即可联机<br>
2. 先进入房间的是O先手，后进入是X后手；只能轮到自己才能落子
</div>

<script src="https://cdn.jsdelivr.net/npm/socket.io@4/dist/socket.io.min.js"></script>
<script>
// 免费公共中转服务器，无需自己部署后端
const socket = io('https://socketio-chat-h9jt.herokuapp.com/');
let roomId = '';
let myRole = null; // O / X
let isMyTurn = false;
let board = ['','','','','','','','',''];
const stateTip = document.getElementById('stateTip');
const cells = document.querySelectorAll('td');

// 绑定格子点击
cells.forEach(cell=>{
    cell.onclick = ()=>{
        const idx = Number(cell.dataset.index);
        if(!roomId || !myRole || !isMyTurn || board[idx]) return;
        socket.emit('move',{room:roomId,index:idx,role:myRole});
    }
})

// 加入房间
document.getElementById('joinBtn').onclick = ()=>{
    roomId = document.getElementById('roomId').value.trim();
    if(!roomId){
        alert('请填写房间号！');
        return;
    }
    socket.emit('join',roomId);
}

// 监听房间人数分配角色
socket.on('roleAssign',(role)=>{
    myRole = role;
    stateTip.innerText = `已加入房间${roomId}，你是【${role}】`;
    if(role==='O'){
        isMyTurn = true;
        stateTip.innerText += '，轮到你下棋';
    }else{
        isMyTurn = false;
        stateTip.innerText += '，等待对手落子';
    }
});

// 接收对手落子，同步棋盘
socket.on('remoteMove',(data)=>{
    const {index,role,nextTurnRole} = data;
    board[index] = role;
    cells[index].innerText = role;
    cells[index].classList.add(role);
    // 切换回合
    isMyTurn = (myRole === nextTurnRole);
    stateTip.innerText = isMyTurn ? '轮到你下棋' : '等待对手落子';
    checkWin();
})

// 有人离开房间
socket.on('userLeave',()=>{
    alert('对手已退出房间，游戏终止');
    resetGame();
})

// 重置游戏
function resetGame(){
    socket.emit('restart',roomId);
}
socket.on('gameReset',()=>{
    board = ['','','','','','','','',''];
    cells.forEach(c=>{
        c.innerText = '';
        c.className = '';
    })
    isMyTurn = (myRole==='O');
    stateTip.innerText = isMyTurn ? '新对局，轮到你下棋' : '等待对手';
})

// 胜负判定
function checkWin(){
    let winLine = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let line of winLine){
        let [a,b,c] = line;
        if(board[a] && board[a]===board[b] && board[a]===board[c]){
            setTimeout(()=>{
                alert(`${board[a]} 玩家获胜！`);
            },100);
            return;
        }
    }
    if(!board.includes('')){
        setTimeout(()=>{
            alert('棋盘填满，平局！');
        },100);
    }
}
</script>
</body>
</html>
