<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>联机井字棋</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei",sans-serif;
}
body{
    background: linear-gradient(135deg, #e8f4fd, #fef4f8);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
}
h1{
    color: #222;
    margin-bottom: 15px;
    font-size: 26px;
}
.room-box{
    background:#fff;
    padding:16px 24px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    margin-bottom:20px;
    display:flex;
    gap:10px;
    align-items:center;
}
#roomId{
    padding:8px 12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
    width:140px;
}
#joinBtn{
    padding:8px 16px;
    background:#2196F3;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
#stateTip{
    margin-bottom:16px;
    font-size:17px;
    color:#333;
}
.game-card{
    background: #fff;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.12);
}
table{
    border-collapse: separate;
    border-spacing: 8px;
}
td{
    width: 85px;
    height: 85px;
    background-color: #f2f7ff;
    border-radius: 10px;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
}
td:hover{
    background-color: #dceaff;
    transform: scale(1.03);
}
td.O{
    color: #1976d2;
}
td.X{
    color: #d32f2f;
}
.restart-btn{
    margin-top: 18px;
    padding: 9px 24px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg,#42a5f5,#1976d2);
    color: white;
    font-size: 16px;
    cursor: pointer;
}
.restart-btn:hover{
    box-shadow: 0 5px 15px rgba(25,118,210,0.3);
}
.tips{
    margin-top:20px;
    font-size:14px;
    color:#666;
    text-align:center;
    max-width:420px;
    line-height:1.6;
}
</style>
</head>
<body>
<h1>🌐 兼容校园网联机井字棋</h1>
<div class="room-box">
    <span>房间号：</span>
    <input id="roomId" placeholder="6位数字房间码" maxlength="6">
    <button id="joinBtn">加入/创建房间</button>
</div>
<div id="stateTip">未连接房间，请输入房间号加入</div>
<div class="game-card">
<table>
    <tr>
        <td data-index="0"></td>
        <td data-index="1"></td>
        <td data-index="2"></td>
    </tr>
    <tr>
        <td data-index="3"></td>
        <td data-index="4"></td>
        <td data-index="5"></td>
    </tr>
    <tr>
        <td data-index="6"></td>
        <td data-index="7"></td>
        <td data-index="8"></td>
    </tr>
</table>
<button class="restart-btn" onclick="resetGame()">重新开局</button>
</div>
<div class="tips">
1. 第一人先创建房间等待，第二人延迟3秒再加入<br>
2. 校园网也可正常联机，轮到自己才能落子，棋盘双向同步
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// 配置全球免费中转服务器，绕过校园网内网拦截
const peerConfig = {
    config: {
        iceServers: [
            // STUN 打洞
            {urls: "stun:stun.l.google.com:19302"},
            {urls: "stun:stun1.l.google.com:19302"},
            // TURN 中继兜底（外网中转，校园网必走这条）
            {
                urls: "turn:openrelay.metered.ca:80",
                username: "openrelayproject",
                credential: "openrelayproject"
            }
        ]
    }
};

let peer, conn;
let roomId = '';
let myRole = null;
let isMyTurn = false;
let board = ['','','','','','','','',''];
const stateTip = document.getElementById('stateTip');
const cells = document.querySelectorAll('td');

// 格子点击落子
cells.forEach(cell=>{
    cell.onclick = ()=>{
        const idx = Number(cell.dataset.index);
        if(!conn || !myRole || !isMyTurn || board[idx]) return;
        conn.send({type:'move',index:idx,role:myRole});
    }
})

// 加入房间按钮逻辑
document.getElementById('joinBtn').onclick = ()=>{
    roomId = document.getElementById('roomId').value.trim();
    if(!roomId || roomId.length!==6){
        alert('请填写6位数字房间号！');
        return;
    }
    stateTip.innerText = "正在连接中转服务器，请稍候...";
    peer = new Peer(roomId, peerConfig);

    // 自己创建房间（O先手）
    peer.on('open', ()=>{
        myRole = 'O';
        isMyTurn = true;
        stateTip.innerText = `你是房主【O】，等待对方接入（校园网连接会慢几秒）`;
        peer.on('connection', c=>{
            conn = c;
            bindConnEvent();
            stateTip.innerText = `对手成功接入！轮到你下棋`;
        })
    })

    // 加入别人房间（X后手）
    peer.on('error', err=>{
        if(err.type === 'unavailable-id'){
            peer = new Peer(undefined, peerConfig);
            peer.on('open',()=>{
                conn = peer.connect(roomId);
                myRole = 'X';
                isMyTurn = false;
                stateTip.innerText = `你是【X】，等待房主落子`;
                bindConnEvent();
            })
        }else{
            stateTip.innerText = `连接失败，多点击一次加入房间重试`;
        }
    })
}

// 绑定通信事件
function bindConnEvent(){
    conn.on('data', data=>{
        if(data.type === 'move'){
            const {index,role} = data;
            board[index] = role;
            cells[index].innerText = role;
            cells[index].classList.add(role);
            isMyTurn = !isMyTurn;
            stateTip.innerText = isMyTurn ? '轮到你落子' : '等待对手落子';
            checkWin();
        }
        if(data.type === 'restart') resetLocalBoard();
    })
    conn.on('close',()=>{
        alert('对手断开连接，对局结束');
        resetLocalBoard();
    })
}

// 本地重置棋盘
function resetLocalBoard(){
    board = ['','','','','','','','',''];
    cells.forEach(c=>{
        c.innerText = '';
        c.className = '';
    })
    isMyTurn = myRole === 'O';
    stateTip.innerText = isMyTurn ? '新对局轮到你下棋' : '等待对手';
}

// 双方同步重启对局
function resetGame(){
    if(conn) conn.send({type:'restart'});
    resetLocalBoard();
}

// 胜负判定
function checkWin(){
    const winLine = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let line of winLine){
        const [a,b,c] = line;
        if(board[a] && board[a]===board[b] && board[a]===board[c]){
            setTimeout(()=>alert(`${board[a]} 玩家获胜！`),100);
            return;
        }
    }
    if(!board.includes('')) setTimeout(()=>alert('棋盘填满，平局！'),100);
}
</script>
</body>
</html>
