<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>飞机大战</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei",sans-serif;
}
body{
    background:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}
h1{
    color:#fff;
    margin-bottom:12px;
}
.info{
    color:#fff;
    font-size:18px;
    margin-bottom:10px;
}
#gameCanvas{
    border:2px solid #4488ff;
    background:#000;
}
.ctrl-tips{
    margin-top:12px;
    color:#aaa;
    font-size:14px;
}
</style>
</head>
<body>
    <h1>✈️ 经典飞机大战</h1>
    <div class="info">当前得分：<span id="score">0</span></div>
    <canvas id="gameCanvas" width="320" height="568"></canvas>
    <div class="ctrl-tips">操作：方向键 ↑ ↓ ← → 移动飞机，空格键发射子弹</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDom = document.getElementById('score');

// 玩家飞机
const player = {
    x: canvas.width/2 - 20,
    y: canvas.height - 80,
    w: 40,
    h: 40,
    speed: 6,
    fireCd: 150,
    lastFire: 0
};

let score = 0;
let keys = {};
let bullets = [];
let enemies = [];
let explosions = [];
let frameId;

// 键盘监听
document.addEventListener('keydown',e=>{
    keys[e.code] = true;
    if(e.code === 'Space') e.preventDefault();
});
document.addEventListener('keyup',e=>{
    keys[e.code] = false;
});

// 绘制玩家飞机
function drawPlayer(){
    ctx.fillStyle="#42a5f5";
    ctx.beginPath();
    ctx.moveTo(player.x+player.w/2, player.y);
    ctx.lineTo(player.x, player.y+player.h);
    ctx.lineTo(player.x+player.w, player.y+player.h);
    ctx.closePath();
    ctx.fill();
    // 机翼
    ctx.fillStyle="#1976d2";
    ctx.fillRect(player.x-8, player.y+15, 12, 18);
    ctx.fillRect(player.x+player.w-4, player.y+15, 12, 18);
}

// 发射子弹
function fireBullet(timestamp){
    if(timestamp - player.lastFire < player.fireCd) return;
    player.lastFire = timestamp;
    bullets.push({
        x: player.x + player.w/2 - 3,
        y: player.y - 12,
        w:6,
        h:14,
        speed:8
    });
}

// 生成敌机
function createEnemy(){
    const w = 36;
    enemies.push({
        x: Math.random()*(canvas.width-w),
        y: -w,
        w:w,
        h:w,
        speed: 2+Math.random()*2
    });
}

// 碰撞检测
function isCollide(a,b){
    return a.x < b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// 游戏主循环
function loop(timestamp){
    frameId = requestAnimationFrame(loop);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 玩家移动
    if(keys['ArrowLeft'] && player.x>0) player.x -= player.speed;
    if(keys['ArrowRight'] && player.x+player.w < canvas.width) player.x += player.speed;
    if(keys['ArrowUp'] && player.y>0) player.y -= player.speed;
    if(keys['ArrowDown'] && player.y+player.h < canvas.height) player.y += player.speed;
    if(keys['Space']) fireBullet(timestamp);

    // 子弹更新+绘制
    for(let i=bullets.length-1;i>=0;i--){
        const b = bullets[i];
        b.y -= b.speed;
        if(b.y < -b.h){
            bullets.splice(i,1);
            continue;
        }
        ctx.fillStyle="#ffea00";
        ctx.fillRect(b.x,b.y,b.w,b.h);
    }

    // 随机生成敌机
    if(Math.random()<0.025) createEnemy();

    // 敌机更新
    for(let i=enemies.length-1;i>=0;i--){
        const e = enemies[i];
        e.y += e.speed;
        if(e.y>canvas.height){
            enemies.splice(i,1);
            continue;
        }
        // 敌机样式
        ctx.fillStyle="#d32f2f";
        ctx.beginPath();
        ctx.arc(e.x+e.w/2,e.y+e.w/2,e.w/2,0,Math.PI*2);
        ctx.fill();

        // 子弹击中敌机
        for(let j=bullets.length-1;j>=0;j--){
            const b = bullets[j];
            if(isCollide(b,e)){
                bullets.splice(j,1);
                enemies.splice(i,1);
                score +=10;
                scoreDom.textContent = score;
                explosions.push({x:e.x,y:e.y,size:e.w,time:15});
                break;
            }
        }

        // 撞到敌机，游戏结束
        if(isCollide(player,e)){
            cancelAnimationFrame(frameId);
            alert(`游戏结束！最终得分：${score}`);
            location.reload();
        }
    }

    // 爆炸效果
    for(let i=explosions.length-1;i>=0;i--){
        const exp = explosions[i];
        ctx.fillStyle=`rgba(255,120,0,${exp.time/15})`;
        ctx.beginPath();
        ctx.arc(exp.x+exp.size/2,exp.y+exp.size/2,exp.size/2,0,Math.PI*2);
        ctx.fill();
        exp.time--;
        if(exp.time<=0) explosions.splice(i,1);
    }

    drawPlayer();
}

// 启动游戏
requestAnimationFrame(loop);
</script>
</body>
</html>
