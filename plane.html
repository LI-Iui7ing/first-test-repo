<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>飞机大战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
.game-box{margin:20px auto;width:512px;text-align:center}
#canvas{border:1px solid #666;background:#050510}
.tip-text{margin-top:10px;color:#222;font-size:15px;}
</style>
</head>
<body>
<div class="game-box">
    <canvas id="canvas" width="512" height="768"></canvas>
    <div class="tip-text">点击游戏画面开始游戏 | 鼠标移动操控飞机 | Q/W/E切换飞机 | R开启散射子弹</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const context = canvas.getContext("2d");
const WIDTH = canvas.width;
const HEIGHT = canvas.height;

// 游戏状态枚举
const START = 0;
const STARTTING = 1;
const RUNNING = 2;
const PAUSED = 3;
const GAMEOVER = 4;
let state = START;
let score = 0;
let life = 3;

// 星空滚动背景
class Background {
    constructor() {
        this.y1 = 0;
        this.y2 = -HEIGHT;
        this.stars = [];
        for(let i=0;i<80;i++){
            this.stars.push({
                x: Math.random()*WIDTH,
                y: Math.random()*HEIGHT,
                r: Math.random()*0.8+0.2
            })
        }
    }
    paint(cxt) {
        cxt.fillStyle="#050510";
        cxt.fillRect(0,0,WIDTH,HEIGHT);
        cxt.fillStyle="#ffffff";
        this.stars.forEach(s=>{
            cxt.beginPath();
            cxt.arc(s.x,s.y,s.r,0,Math.PI*2);
            cxt.fill();
            s.y += 0.6;
            if(s.y>HEIGHT){
                s.y=0;
                s.x=Math.random()*WIDTH;
            }
        })
    }
    step() {
        this.y1 += 2;
        this.y2 += 2;
        if(this.y1 >= HEIGHT) this.y1 = -HEIGHT;
        if(this.y2 >= HEIGHT) this.y2 = -HEIGHT;
    }
}
const bg = new Background();

// 我方飞机
class Hero {
    constructor() {
        this.w = 80;
        this.h = 81;
        this.x = (WIDTH - this.w)/2;
        this.y = HEIGHT - this.h - 30;
        this.life = 20;
        this.down = false;
        this.shipStyle = 0; // 0蓝 1绿 2橙
    }
    paint(cxt) {
        cxt.save();
        const cx = this.x + this.w/2;
        if(this.shipStyle === 0) cxt.fillStyle="#2196F3";
        else if(this.shipStyle === 1) cxt.fillStyle="#4CAF50";
        else cxt.fillStyle="#FF9800";

        // 机身
        cxt.beginPath();
        cxt.moveTo(cx, this.y);
        cxt.lineTo(this.x, this.y+this.h);
        cxt.lineTo(this.x+this.w, this.y+this.h);
        cxt.closePath();
        cxt.fill();
        // 机翼
        cxt.fillRect(this.x-8, this.y+16, 12, 18);
        cxt.fillRect(this.x+this.w-4, this.y+16, 12, 18);
        // 尾焰
        cxt.fillStyle="#FF5722";
        cxt.beginPath();
        cxt.moveTo(cx-5, this.y+this.h);
        cxt.lineTo(cx, this.y+this.h+6+Math.random()*4);
        cxt.lineTo(cx+5, this.y+this.h);
        cxt.fill();
        cxt.restore();
    }
    getRect() {
        return {x:this.x,y:this.y,w:this.w,h:this.h}
    }
    hurt() {
        this.life--;
        if(this.life <= 0) {
            this.down = true;
            life--;
            if(life <= 0) state = GAMEOVER;
        }
    }
}
let hero = new Hero();

// 子弹类
class Bullet {
    constructor(x,y,offsetX=0) {
        this.w = 11;
        this.h = 25;
        this.x = x + offsetX;
        this.y = y;
        this.speed = 24;
        this.del = false;
    }
    paint(cxt) {
        cxt.fillStyle="#FFEB3B";
        cxt.fillRect(this.x,this.y,this.w,this.h);
    }
    step() {
        this.y -= this.speed;
        if(this.y < -this.h) this.del = true;
    }
    getRect() {
        return {x:this.x,y:this.y,w:this.w,h:this.h}
    }
}
let bulletList = [];
let shootTimer = 0;
const SHOOT_INTERVAL = 6;
let multiBullet = false;

// 敌机类
class Enemy {
    constructor(type) {
        this.type = type;
        this.down = false;
        this.del = false;
        if(type === 1) {
            this.w = 68;this.h=55;this.hp=4;this.score=1;this.speed=5;
        }else if(type === 2) {
            this.w = 90;this.h=60;this.hp=10;this.score=3;this.speed=3;
        }else{
            this.w = 222;this.h=170;this.hp=20;this.score=10;this.speed=2;
        }
        this.x = Math.random()*(WIDTH - this.w);
        this.y = -this.h;
    }
    paint(cxt) {
        if(this.type===1) cxt.fillStyle="#f44336";
        else if(this.type===2) cxt.fillStyle="#9c27b0";
        else cxt.fillStyle="#222222";
        if(this.down) cxt.fillStyle="#ff9800";
        cxt.fillRect(this.x,this.y,this.w,this.h);
    }
    step() {
        if(this.down) {
            this.del = true;
            score += this.score;
            return;
        }
        this.y += this.speed;
        if(this.y > HEIGHT) this.del = true;
    }
    hurt() {
        this.hp--;
        if(this.hp <= 0) this.down = true;
    }
    getRect() {
        return {x:this.x,y:this.y,w:this.w,h:this.h}
    }
}
let enemyList = [];

// 碰撞检测工具
function checkCollision(a,b) {
    return a.x < b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// 生成敌机
function spawnEnemy() {
    const r = Math.random()*50;
    if(r>=6&&r<=15) enemyList.push(new Enemy(1));
    else if(r>=16&&r<=20) enemyList.push(new Enemy(2));
    else if(r>=41&&r<=45 && !enemyList.some(e=>e.type===3)) enemyList.push(new Enemy(3));
}

// 自动发射子弹
function doShoot() {
    shootTimer++;
    if(shootTimer < SHOOT_INTERVAL) return;
    shootTimer = 0;
    const h = hero.getRect();
    bulletList.push(new Bullet(h.x+h.w/2-5, h.y));
    if(multiBullet) {
        bulletList.push(new Bullet(h.x+h.w/2-5, h.y, -22));
        bulletList.push(new Bullet(h.x+h.w/2-5, h.y, 22));
    }
}

// 鼠标移动控制飞机
canvas.onmousemove = function(e) {
    if(state !== RUNNING) return;
    const rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left - hero.w/2;
    let my = e.clientY - rect.top - hero.h/2;
    // 边界锁定
    mx = Math.max(0, Math.min(WIDTH-hero.w, mx));
    my = Math.max(0, Math.min(HEIGHT-hero.h, my));
    hero.x = mx;
    hero.y = my;
}

// 点击画布进入游戏
canvas.onclick = function() {
    if(state === START) state = RUNNING;
}

// 鼠标移出暂停、移入继续
canvas.onmouseout = ()=>{if(state===RUNNING) state=PAUSED;}
canvas.onmouseover = ()=>{if(state===PAUSED) state=RUNNING;}

// 键盘按键
document.onkeydown = function(e) {
    const key = e.keyCode;
    if(key === 81) hero.shipStyle = 0; // Q
    if(key === 87) hero.shipStyle = 1; // W
    if(key === 69) hero.shipStyle = 2; // E
    if(key === 82) multiBullet = !multiBullet; // R 开启散射子弹
}

// 绘制顶部文字
function drawUI() {
    context.fillStyle="#ffffff";
    context.font="bold 24px Microsoft YaHei";
    context.fillText("SCORE : "+score, 10, 30);
    context.fillText("LIFE : "+life, WIDTH-130, 30);
}

// 主循环
setInterval(()=>{
    bg.paint(context);
    bg.step();

    switch(state) {
        case START:
            context.fillStyle="#fff";
            context.font="32px Microsoft YaHei";
            context.textAlign="center";
            context.fillText("点击画面任意位置开始游戏", WIDTH/2, HEIGHT/2);
            context.textAlign="left";
            break;

        case RUNNING:
            doShoot();
            hero.paint(context);

            // 更新&绘制子弹
            bulletList.forEach(b=>{b.step();b.paint(context);});
            bulletList = bulletList.filter(b=>!b.del);

            // 生成敌机
            if(Math.random()<0.025) spawnEnemy();
            enemyList.forEach(e=>{e.step();e.paint(context);});
            enemyList = enemyList.filter(e=>!e.del);

            // 碰撞检测
            const heroRect = hero.getRect();
            enemyList.forEach(enemy=>{
                const eRect = enemy.getRect();
                // 飞机撞到敌机
                if(checkCollision(heroRect,eRect) && !enemy.down && !hero.down) {
                    hero.hurt();
                    enemy.hurt();
                }
                // 子弹打敌机
                bulletList.forEach(bullet=>{
                    if(checkCollision(bullet.getRect(),eRect) && !enemy.down) {
                        bullet.del = true;
                        enemy.hurt();
                    }
                })
            })
            drawUI();
            break;

        case PAUSED:
            hero.paint(context);
            bulletList.forEach(b=>b.paint(context));
            enemyList.forEach(e=>e.paint(context));
            drawUI();
            // 半透明遮罩
            context.fillStyle="rgba(0,0,0,0.5)";
            context.fillRect(0,0,WIDTH,HEIGHT);
            context.fillStyle="#fff";
            context.font="36px Microsoft YaHei";
            context.textAlign="center";
            context.fillText("游戏暂停，鼠标移回画布继续", WIDTH/2, HEIGHT/2);
            context.textAlign="left";
            break;

        case GAMEOVER:
            hero.paint(context);
            bulletList.forEach(b=>b.paint(context));
            enemyList.forEach(e=>e.paint(context));
            drawUI();
            context.fillStyle="#ff4444";
            context.font="48px Microsoft YaHei";
            context.textAlign="center";
            context.fillText("GAME OVER", WIDTH/2, HEIGHT/2);
            context.textAlign="left";
            break;
    }
}, 30);
</script>
</body>
</html>
